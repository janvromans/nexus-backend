<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;

const SC = { BUY:"#00e5a0", SELL:"#ff3d71", NEUTRAL:"#8896b3" };
const SB = { BUY:"rgba(0,229,160,0.08)", SELL:"rgba(255,61,113,0.08)", NEUTRAL:"rgba(136,150,179,0.06)" };
const SE = { BUY:"rgba(0,229,160,0.25)", SELL:"rgba(255,61,113,0.25)", NEUTRAL:"rgba(136,150,179,0.15)" };

// ── Stablecoin / non-tradeable blacklist ─────────────────────────────────────
const BLACKLIST = new Set([
  // Stablecoins
  'tether','usd-coin','binance-usd','dai','true-usd','frax','usdd','gemini-dollar',
  'paxos-standard','neutrino','usdt','usdc','busd','tusd','usdp','gusd','frax',
  'first-digital-usd','paypal-usd','eurc','stasis-eurs','tether-eurt',
  // Wrapped tokens (track the original instead)
  'wrapped-bitcoin','wrapped-ethereum','wrapped-bnb','staked-ether','wrapped-steth',
  'coinbase-wrapped-staked-eth','rocket-pool-eth','wrapped-eeth',
  // Other non-tradeable
  'leo-token','okb','cronos',
]);

// ── Backend config — set your Railway URL here after deployment ──────────────
const BACKEND_URL    = 'https://nexus-backend-production-1985.up.railway.app';
const BACKEND_API_KEY = 'nexus-2024';

const DEFAULT_SETTINGS = {
  // Legacy thresholds (still used by individual indicators)
  rsiBuyHigh:25, rsiBuyMed:35, rsiSellHigh:75, rsiSellMed:65,
  momBuyThresh:3, momSellThresh:3, momHighThresh:7,
  techWeight:60, buyThresh:62, sellThresh:38,
  rsiConfirmBars:2,
  emaFilterOn:true,
  // Alpha Score weights (new engine)
  // RSI zone rewards: sweet spot 25-45 scores highest
  alphaRsiSweetLo:25, alphaRsiSweetHi:45,  // best RSI zone for early trend entry
  alphaMacdCrossWeight:3,   // bonus for fresh MACD crossover (high predictive value)
  alphaMomMaxGood:15,       // momentum above this = overextended, penalised
  alphaEmaPartialBonus:2,   // reward e9>e21 even without full alignment
  alphaThresh:65,           // Alpha Score >= this → BUY signal
  alphaSellThresh:40,        // Alpha Score <= this → SELL alert fires
};

function ema(prices,period){
  if(!prices||prices.length<period) return null;
  const k=2/(period+1); let v=prices.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=period;i<prices.length;i++) v=prices[i]*k+v*(1-k); return v;
}
function rsi(prices,period=14){
  if(!prices||prices.length<period+1) return null;
  const ch=prices.slice(1).map((p,i)=>p-prices[i]),rec=ch.slice(-period);
  const g=rec.filter(c=>c>0).reduce((a,b)=>a+b,0)/period;
  const l=Math.abs(rec.filter(c=>c<0).reduce((a,b)=>a+b,0))/period;
  return l===0?100:100-100/(1+g/l);
}
function macd(prices){
  const e12=ema(prices,12),e26=ema(prices,26);
  if(!e12||!e26) return null; return {line:e12-e26};
}
function bollinger(prices,period=20){
  if(!prices||prices.length<period) return null;
  const sl=prices.slice(-period),mean=sl.reduce((a,b)=>a+b,0)/period;
  const std=Math.sqrt(sl.reduce((s,p)=>s+Math.pow(p-mean,2),0)/period);
  return {upper:mean+2*std,middle:mean,lower:mean-2*std};
}
function stochastic(prices,k=14,d=3){
  if(!prices||prices.length<k+d) return null;
  const kv=[];
  for(let i=k-1;i<prices.length;i++){
    const sl=prices.slice(i-k+1,i+1),lo=Math.min(...sl),hi=Math.max(...sl);
    kv.push(hi===lo?50:((prices[i]-lo)/(hi-lo))*100);
  }
  const K=kv[kv.length-1],D=kv.slice(-d).reduce((a,b)=>a+b,0)/d;
  const pK=kv.length>1?kv[kv.length-2]:K;
  const pD=kv.length>d?kv.slice(-d-1,-1).reduce((a,b)=>a+b,0)/d:D;
  return {k:K,d:D,prevK:pK,prevD:pD};
}
function atr(prices,period=14){
  if(!prices||prices.length<period+1) return null;
  return prices.slice(1).map((p,i)=>Math.abs(p-prices[i])).slice(-period).reduce((a,b)=>a+b,0)/period;
}
function momentum(prices,period=10){
  if(!prices||prices.length<period+1) return null;
  const old=prices[prices.length-1-period],cur=prices[prices.length-1];
  return old>0?((cur-old)/old)*100:null;
}
function supportResistance(prices,lb=40){
  if(!prices||prices.length<lb) return null;
  const sl=prices.slice(-lb); return {support:Math.min(...sl),resistance:Math.max(...sl)};
}

// Alpha Score engine — rewards early-trend signals, penalises extremes
function computeAlphaScore(history, price, cfg){
  if(!history||history.length<15||!price) return {alpha:50,earlyTrend:false,signals:{}};
  let alpha = 50; // baseline
  const sigs = {};

  const rv  = rsi(history);
  const rp1 = history.length>2  ? rsi(history.slice(0,-1))  : null;
  const rp2 = history.length>3  ? rsi(history.slice(0,-2))  : null;
  const rsiRising   = rv!==null&&rp1!==null && rv>rp1;
  const rsiConfirmed= rv!==null&&rp1!==null&&rp2!==null && rv>rp1 && rp1>rp2;

  // ── RSI contribution (most important signal) ──────────────────────────────
  if(rv!==null){
    const lo=cfg.alphaRsiSweetLo||25, hi=cfg.alphaRsiSweetHi||45;
    if(rv>=lo && rv<hi){
      // Sweet spot: oversold-but-recovering (best zone per analysis: 25-45)
      alpha += rsiConfirmed ? 18 : rsiRising ? 12 : 4;
      sigs.rsi = rsiConfirmed?'SWEET_CONFIRMED':rsiRising?'SWEET_RISING':'SWEET_FLAT';
    } else if(rv<lo){
      // Extreme oversold — penalise unless confirmed rising (falling knife)
      alpha += rsiConfirmed ? 8 : rsiRising ? 4 : -6;
      sigs.rsi = rsiConfirmed?'EXTREME_CONFIRMED':rsiRising?'EXTREME_RISING':'EXTREME_FALLING';
    } else if(rv>=hi && rv<55){
      // Low neutral — mild positive
      alpha += rsiRising ? 6 : 2;
      sigs.rsi = 'LOW_NEUTRAL';
    } else if(rv>=55 && rv<65){
      // Mid-high neutral — slight negative (momentum fading)
      alpha -= 4;
      sigs.rsi = 'HIGH_NEUTRAL';
    } else if(rv>=65){
      // Overbought — penalise, likely extended
      alpha -= (rv>=75 ? 16 : 10);
      sigs.rsi = rv>=75?'EXTREME_OB':'OVERBOUGHT';
    }
  }

  // ── MACD contribution ────────────────────────────────────────────────────
  const mn=macd(history), mp=history.length>2?macd(history.slice(0,-1)):null;
  if(mn&&mp){
    const freshBullCross = mp.line<0 && mn.line>0;
    const freshBearCross = mp.line>0 && mn.line<0;
    const crossBonus = cfg.alphaMacdCrossWeight||3;
    if(freshBullCross){ alpha += crossBonus*4; sigs.macd='FRESH_BULL_CROSS'; }
    else if(mn.line>0 && mn.line>mp.line){ alpha += 6; sigs.macd='BULL_EXPANDING'; }
    else if(mn.line>0){ alpha += 2; sigs.macd='BULL_FLAT'; }
    else if(freshBearCross){ alpha -= crossBonus*4; sigs.macd='FRESH_BEAR_CROSS'; }
    else if(mn.line<0 && mn.line<mp.line){ alpha -= 8; sigs.macd='BEAR_EXPANDING'; }
    else { alpha -= 2; sigs.macd='BEAR_FLAT'; }
  }

  // ── EMA contribution (partial alignment rewarded) ─────────────────────────
  const e9=ema(history,9), e21=ema(history,21), e50v=ema(history,50);
  if(e9&&e21&&e50v){
    const partialBonus = cfg.alphaEmaPartialBonus||2;
    if(e9>e21 && e21>e50v){
      // Full bull alignment — coin already running, smaller bonus (you're late)
      alpha += partialBonus*2;
      sigs.ema='FULL_BULL';
    } else if(e9>e21){
      // Partial bull (e9 just crossed e21) — EARLY signal, bigger bonus
      alpha += partialBonus*3;
      sigs.ema='EARLY_BULL';
    } else if(e9<e21 && e21<e50v){
      alpha -= 10; sigs.ema='FULL_BEAR';
    } else if(e9<e21){
      alpha -= 4; sigs.ema='EARLY_BEAR';
    } else {
      alpha += 0; sigs.ema='MIXED';
    }
  }

  // ── Momentum contribution ────────────────────────────────────────────────
  const mom=momentum(history,10);
  if(mom!==null){
    const maxGood = cfg.alphaMomMaxGood||15;
    if(mom>2 && mom<=maxGood){
      // Healthy momentum sweet spot
      alpha += Math.min(mom*0.6, 8);
      sigs.mom='HEALTHY';
    } else if(mom>maxGood){
      // Overextended — penalise
      alpha -= (mom-maxGood)*0.4;
      sigs.mom='OVEREXTENDED';
    } else if(mom>0){
      alpha += 1; sigs.mom='MILD_POS';
    } else if(mom>-5){
      alpha -= 2; sigs.mom='MILD_NEG';
    } else {
      alpha -= 6; sigs.mom='STRONG_NEG';
    }
  }

  // ── Bollinger contribution ────────────────────────────────────────────────
  const bb=bollinger(history);
  if(bb&&price){
    const pct=(price-bb.lower)/(bb.upper-bb.lower);
    const bw=(bb.upper-bb.lower)/bb.middle*100;
    if(pct<0.15){ alpha += 8; sigs.bb='BELOW_LOWER'; }
    else if(pct<0.3){ alpha += 4; sigs.bb='NEAR_LOWER'; }
    else if(pct>0.85){ alpha -= 10; sigs.bb='ABOVE_UPPER'; }
    else if(pct>0.7){ alpha -= 4; sigs.bb='NEAR_UPPER'; }
    else { sigs.bb='MID'; }
    // Squeeze = breakout coming, slight positive
    if(bw<3){ alpha += 3; sigs.bb=(sigs.bb||'')+'_SQUEEZE'; }
  }

  // ── Stochastic contribution ───────────────────────────────────────────────
  const st=stochastic(history);
  if(st){
    const kRising=st.k>st.prevK;
    const crossUp=st.prevK<st.prevD && st.k>st.d;
    if(st.k<30 && crossUp && kRising){ alpha += 10; sigs.stoch='BULL_CROSS_OVERSOLD'; }
    else if(st.k<30 && kRising)      { alpha += 6;  sigs.stoch='OVERSOLD_RISING'; }
    else if(st.k<30)                 { alpha -= 2;  sigs.stoch='OVERSOLD_FALLING'; }
    else if(st.k>70 && !kRising)     { alpha -= 8;  sigs.stoch='OVERBOUGHT'; }
    else if(st.k>=30 && st.k<=60 && kRising){ alpha += 3; sigs.stoch='MID_RISING'; }
    else { sigs.stoch='NEUTRAL'; }
  }

  // ── Early Trend detection ────────────────────────────────────────────────
  // Fires when RSI is in sweet spot + rising AND either MACD turning or EMA partial
  const earlyTrend = rv!==null && rv>=25 && rv<50 && rsiRising &&
    (sigs.macd==='FRESH_BULL_CROSS'||sigs.macd==='BULL_EXPANDING'||sigs.ema==='EARLY_BULL');

  // Clamp 0-100
  alpha = Math.max(0, Math.min(100, Math.round(alpha)));
  return {alpha, earlyTrend, sigs, rv, rsiRising, rsiConfirmed};
}

function rsiSlope(history, bars=2){
  if(history.length < bars+16) return null;
  const vals = [];
  for(let i=0; i<=bars; i++){
    const v = rsi(history.slice(0, history.length - i));
    if(v===null) return null;
    vals.push(v);
  }
  for(let i=0; i<bars; i++) if(vals[i] <= vals[i+1]) return false;
  return true;
}

function computeSignals(history,price,cfg=DEFAULT_SETTINGS){
  if(!history||history.length<15||!price) return {results:[],overall:"NEUTRAL",score:50,alpha:50,earlyTrend:false,buy:0,sell:0,neutral:0,alerts:[],sr:null,atrVal:null,rsiBlocked:false,emaBlocked:false,stochBlocked:false};
  const results=[]; let buy=0,sell=0,neutral=0;

  // ── Compute Alpha Score (new engine) ─────────────────────────────────────
  const {alpha,earlyTrend,sigs,rv,rsiRising,rsiConfirmed} = computeAlphaScore(history,price,cfg);

  // ── Pre-compute shared values ─────────────────────────────────────────────
  const e9f=ema(history,9),e21f=ema(history,21),e50f=ema(history,50);
  const emaBearish = e9f&&e21f&&e50f && e9f<e21f && e21f<e50f;
  const emaBlocked = cfg.emaFilterOn && emaBearish;
  const rp1=history.length>2?rsi(history.slice(0,-1)):null;
  const rp2=history.length>3?rsi(history.slice(0,-2)):null;
  const rsiDir = rv!==null&&rp1!==null ? rv-rp1 : 0;
  const confirmBars = cfg.rsiConfirmBars||2;

  let rsiBlocked = false;
  if(rv!==null){
    const tr=rsiDir; let sig,urgency,note,detail,blocked=false;
    const rawBuy  = rv<cfg.rsiBuyHigh||rv<cfg.rsiBuyMed;
    const rawSell = rv>cfg.rsiSellHigh||rv>cfg.rsiSellMed;
    // Early trend zone — new signal type
    const sweetSpot = rv>=(cfg.alphaRsiSweetLo||25) && rv<(cfg.alphaRsiSweetHi||45) && rsiRising;

    if(sweetSpot && !rawSell){
      sig="BUY"; urgency="MED";
      note="⚡ Early trend zone — RSI rising in sweet spot";
      detail=`RSI ${rv.toFixed(1)} — in ${cfg.alphaRsiSweetLo||25}-${cfg.alphaRsiSweetHi||45} sweet spot, rising`;
    } else if(rawBuy){
      if(!rsiConfirmed){
        sig="NEUTRAL"; urgency="MED";
        note="⚠ Oversold but RSI still falling — wait for turn";
        detail=`RSI ${rv.toFixed(1)} — awaiting ${confirmBars}-bar upturn confirmation`;
        blocked=true; rsiBlocked=true;
      } else if(emaBlocked){
        sig="NEUTRAL"; urgency="MED";
        note="⚠ Oversold but trend is bearish — EMA filter active";
        detail=`RSI ${rv.toFixed(1)} — EMA9<EMA21<EMA50, downtrend in force`;
        blocked=true; rsiBlocked=true;
      } else {
        if(rv<cfg.rsiBuyHigh){sig="BUY";urgency="HIGH";note="🔥 Oversold + RSI turning up";detail=`RSI ${rv.toFixed(1)} — confirmed reversal below ${cfg.rsiBuyHigh}`;}
        else                 {sig="BUY";urgency="MED"; note="Oversold + RSI rising";       detail=`RSI ${rv.toFixed(1)} — confirmed upturn below ${cfg.rsiBuyMed}`;}
      }
    } else if(rawSell){
      if(rv>cfg.rsiSellHigh){sig="SELL";urgency="HIGH";note="Extreme overbought";   detail=`RSI ${rv.toFixed(1)} — above ${cfg.rsiSellHigh}`;}
      else                  {sig="SELL";urgency="MED"; note="Overbought territory"; detail=`RSI ${rv.toFixed(1)} — above ${cfg.rsiSellMed}`;}
    } else {
      sig="NEUTRAL";urgency="LOW";
      note=tr>0?"Rising momentum":"Fading momentum";
      detail=`RSI ${rv.toFixed(1)}`;
    }
    results.push({id:"RSI",label:"RSI (14) + Alpha",value:rv.toFixed(1),sig,urgency,note,detail,blocked,
      gauge:{val:rv,min:0,max:100,zones:[
        {from:0,to:cfg.rsiBuyMed,col:"#00e5a0"},
        {from:cfg.rsiBuyMed,to:cfg.alphaRsiSweetHi||45,col:"#ffd166"},
        {from:cfg.alphaRsiSweetHi||45,to:cfg.rsiSellMed,col:"#8896b3"},
        {from:cfg.rsiSellMed,to:100,col:"#ff3d71"}
      ]}});
    if(sig==="BUY")buy++; else if(sig==="SELL")sell++; else neutral++;
  }

  const mn=macd(history),mp=history.length>2?macd(history.slice(0,-1)):null;
  if(mn){
    const freshBull=mp&&mp.line<0&&mn.line>0, freshBear=mp&&mp.line>0&&mn.line<0;
    const sig=mn.line>0?"BUY":"SELL";
    const urgency=freshBull||freshBear?"HIGH":Math.abs(mn.line)>Math.abs(mp?.line||0)?"MED":"LOW";
    const note=freshBull?"🔥 Fresh bullish crossover!":freshBear?"🔻 Fresh bearish crossover!":sig==="BUY"?"Above signal line":"Below signal line";
    results.push({id:"MACD",label:"MACD",value:mn.line>0?`+${mn.line.toFixed(4)}`:mn.line.toFixed(4),sig,urgency,note,
      detail:freshBull||freshBear?"Fresh crossover — high-conviction signal":`Histogram: ${mn.line>0?"positive":"negative"}`,gauge:null});
    if(sig==="BUY")buy++; else sell++;
  }

  const bb=bollinger(history);
  if(bb&&price){
    const bw=(bb.upper-bb.lower)/bb.middle*100,pct=(price-bb.lower)/(bb.upper-bb.lower),squeeze=bw<3;
    let sig,urgency,note;
    if(price<bb.lower)      {sig="BUY";    urgency="HIGH";note="Price below lower band";}
    else if(price>bb.upper) {sig="SELL";   urgency="HIGH";note="Price above upper band";}
    else if(squeeze)        {sig="NEUTRAL";urgency="MED"; note="Squeeze — breakout imminent";}
    else if(pct<0.25)       {sig="BUY";    urgency="MED"; note="Near lower band support";}
    else if(pct>0.75)       {sig="SELL";   urgency="MED"; note="Near upper band resistance";}
    else                    {sig="NEUTRAL";urgency="LOW"; note="Mid-band range";}
    results.push({id:"BB",label:"Bollinger Bands",value:`${(pct*100).toFixed(0)}%`,sig,urgency,note,
      detail:`BW: ${bw.toFixed(1)}%${squeeze?" — SQUEEZE":""}  |  $${bb.lower.toFixed(2)} – $${bb.upper.toFixed(2)}`,
      gauge:{val:pct*100,min:0,max:100,zones:[{from:0,to:20,col:"#00e5a0"},{from:20,to:80,col:"#8896b3"},{from:80,to:100,col:"#ff3d71"}]}});
    if(sig==="BUY")buy++; else if(sig==="SELL")sell++; else neutral++;
  }

  const e9=ema(history,9),e21=ema(history,21),e50v=ema(history,50);
  if(e9&&e21&&e50v){
    const fullBull=e9>e21&&e21>e50v, fullBear=e9<e21&&e21<e50v;
    const earlyBull=!fullBull&&!fullBear&&e9>e21, earlyBear=!fullBull&&!fullBear&&e9<e21;
    const sep=Math.abs(e9-e50v)/e50v*100;
    let sig,urgency,note;
    if(fullBull)      {sig="BUY";    urgency=sep>1?"HIGH":"MED"; note="Full bullish alignment";}
    else if(earlyBull){sig="BUY";    urgency="MED"; note="⚡ Early bull — EMA9 just crossed EMA21";}
    else if(earlyBear){sig="SELL";   urgency="MED"; note="Early bear — EMA9 dropped below EMA21";}
    else if(fullBear) {sig="SELL";   urgency=sep>1?"HIGH":"MED"; note="Full bearish alignment";}
    else              {sig="NEUTRAL";urgency="LOW"; note="Mixed — no clear trend";}
    results.push({id:"EMA",label:"EMA Trend (9/21/50)",value:`${sep.toFixed(2)}%`,sig,urgency,note,
      detail:`EMA9: $${e9.toFixed(2)}  EMA21: $${e21.toFixed(2)}  EMA50: $${e50v.toFixed(2)}`,gauge:null});
    if(sig==="BUY")buy++; else if(sig==="SELL")sell++; else neutral++;
  }

  const st=stochastic(history);
  if(st){
    const crossUp=st.prevK<st.prevD&&st.k>st.d, crossDown=st.prevK>st.prevD&&st.k<st.d;
    const kRising=st.k>st.prevK;
    let sig,urgency,note,stochBlocked=false,detail;
    if(st.k<20&&crossUp&&kRising)  {sig="BUY";    urgency="HIGH";note="🔥 Bullish K/D cross + K rising";detail="K crossed above D in oversold zone";}
    else if(st.k<20&&crossUp)      {sig="BUY";    urgency="HIGH";note="🔥 Bullish K/D cross in oversold";detail="K crossed above D";}
    else if(st.k>80&&crossDown)    {sig="SELL";   urgency="HIGH";note="🔻 Bearish K/D cross in overbought";detail="K crossed below D";}
    else if(st.k<20&&kRising)      {sig="BUY";    urgency="MED"; note="Oversold + K turning up";detail="K rising from oversold";}
    else if(st.k<20&&!kRising)     {sig="NEUTRAL";urgency="MED";note="⚠ Oversold but K still falling";detail="Direction filter active";stochBlocked=true;}
    else if(st.k>=20&&st.k<=50&&kRising){sig="BUY";urgency="LOW";note="⚡ K rising in lower range";detail="Early stochastic momentum";}
    else if(st.k>80)               {sig="SELL";   urgency="MED"; note="Overbought — watch for cross";detail="K in overbought zone";}
    else                           {sig="NEUTRAL";urgency="LOW"; note="Mid-range stochastic";detail="K/D in neutral zone";}
    results.push({id:"STOCH",label:"Stochastic (14,3)",value:`K:${st.k.toFixed(0)} D:${st.d.toFixed(0)}`,sig,urgency,note,detail,blocked:stochBlocked,
      gauge:{val:st.k,min:0,max:100,zones:[{from:0,to:20,col:"#00e5a0"},{from:20,to:80,col:"#8896b3"},{from:80,to:100,col:"#ff3d71"}]}});
    if(sig==="BUY")buy++; else if(sig==="SELL")sell++; else neutral++;
  }

  const mom=momentum(history,10);
  if(mom!==null){
    const maxGood=cfg.alphaMomMaxGood||15;
    let sig,urgency,note;
    if(mom>cfg.momBuyThresh&&mom<=maxGood)   {sig="BUY";    urgency=mom>cfg.momHighThresh?"HIGH":"MED"; note=mom>cfg.momHighThresh?"Strong healthy momentum":"Healthy upward momentum";}
    else if(mom>maxGood)                     {sig="NEUTRAL";urgency="MED"; note:`⚠ Overextended +${mom.toFixed(1)}% — may retrace`;}
    else if(mom<-cfg.momSellThresh)          {sig="SELL";   urgency=Math.abs(mom)>cfg.momHighThresh?"HIGH":"MED"; note:"Negative momentum";}
    else                                     {sig="NEUTRAL";urgency:"LOW"; note:mom>0?"Mild drift up":"Mild drift down";}
    results.push({id:"MOM",label:"Momentum (10)",value:`${mom>0?"+":""}${mom.toFixed(2)}%`,sig,urgency,note,
      detail:`10-period change: ${mom>0?"+":""}${mom.toFixed(2)}%  (healthy range: +${cfg.momBuyThresh}% to +${maxGood}%)`,gauge:null});
    if(sig==="BUY")buy++; else if(sig==="SELL")sell++; else neutral++;
  }

  const sr=supportResistance(history,40),atrVal=atr(history);

  // ── Final score: blend legacy vote% with Alpha Score ─────────────────────
  const legacyScore=(buy+sell)>0?Math.round(((buy-sell)/(buy+sell)+1)/2*100):50;
  // 40% legacy votes, 60% alpha score — alpha captures quality, legacy captures consensus
  const score = Math.round(legacyScore*0.4 + alpha*0.6);
  const overall = earlyTrend&&score>=55 ? "BUY"
                : score>=(cfg.alphaThresh||65) ? "BUY"
                : score<=(100-(cfg.alphaThresh||65)) ? "SELL"
                : "NEUTRAL";

  const alerts=results.filter(r=>r.urgency==="HIGH"&&r.sig!=="NEUTRAL");
  const stochBlocked=results.find(r=>r.id==="STOCH")?.blocked||false;
  return {results,overall,score,alpha,earlyTrend,buy,sell,neutral,alerts,sr,atrVal,rsiBlocked,emaBlocked,stochBlocked};
}

function runBacktest(history,cfg){
  if(!history||history.length<40) return null;
  const trades=[],step=Math.max(1,Math.floor(history.length/100));
  let position=null;
  for(let i=30;i<history.length-1;i+=step){
    const slice=history.slice(0,i+1),price=history[i];
    const {overall}=computeSignals(slice,price,cfg);
    if(!position&&overall==="BUY") position={entryPrice:price,entryIdx:i};
    else if(position&&overall==="SELL"){
      const pnl=((history[i]-position.entryPrice)/position.entryPrice)*100;
      trades.push({entryIdx:position.entryIdx,exitIdx:i,entryPrice:position.entryPrice,exitPrice:history[i],pnl,holdBars:i-position.entryIdx});
      position=null;
    }
  }
  if(position){
    const pnl=((history[history.length-1]-position.entryPrice)/position.entryPrice)*100;
    trades.push({entryIdx:position.entryIdx,exitIdx:history.length-1,entryPrice:position.entryPrice,exitPrice:history[history.length-1],pnl,holdBars:history.length-1-position.entryIdx,open:true});
  }
  if(trades.length===0) return {trades:[],winRate:0,totalReturn:"0.00",avgTrade:"0.00",bestTrade:"0.00",worstTrade:"0.00",totalTrades:0};
  const wins=trades.filter(t=>t.pnl>0),totalReturn=trades.reduce((a,t)=>a+t.pnl,0);
  return {trades,winRate:Math.round((wins.length/trades.length)*100),totalReturn:totalReturn.toFixed(2),
    avgTrade:(totalReturn/trades.length).toFixed(2),bestTrade:Math.max(...trades.map(t=>t.pnl)).toFixed(2),
    worstTrade:Math.min(...trades.map(t=>t.pnl)).toFixed(2),totalTrades:trades.length};
}

function Spark({data,color,w=60,h=24}){
  if(!data||data.length<2) return <span style={{color:"#2a3a5a",fontSize:9}}>—</span>;
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((p,i)=>`${(i/(data.length-1))*w},${h-((p-mn)/rng)*(h-4)+2}`).join(" ");
  return <svg width={w} height={h} style={{display:"block"}}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>;
}

  if(!data||data.length<2) return null;
  const W=700,H=180,mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const px=i=>(i/(data.length-1))*W,py=v=>H-((v-mn)/rng)*(H-12)+6;
  const pts=data.map((p,i)=>`${px(i)},${py(p)}`).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:180}} preserveAspectRatio="none">
      <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">

            <div style={{fontSize:10,color:"#4a5a7a",letterSpacing:"0.15em",marginBottom:10}}>SENTIMENT METRICS</div>
            {[["Sentiment",result.sentiment,scoreColor],["Risk",result.risk,result.risk==="High"?SC.SELL:result.risk==="Low"?SC.BUY:"#ffd166"]].map(([lbl,val,col])=>(
              <div key={lbl} style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>

              <div style={{height:4,borderRadius:2,background:"#1c2535",overflow:"hidden"}}>
                <div style={{height:"100%",width:`${result.score}%`,background:`linear-gradient(90deg,${SC.SELL},${scoreColor})`,borderRadius:2,transition:"width 0.5s"}}/>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:4,fontSize:9,color:"#3a4a6a"}}><span>BEARISH 0</span><span>100 BULLISH</span></div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  );
}

// ── Watchlist Tab ─────────────────────────────────────────────────────────────
// ── Accuracy Tracker ──────────────────────────────────────────────────────────
// Pins specific coins, logs every BUY→SELL cycle, measures accuracy over time.
function AccuracyTracker({trackedCoins,setTrackedCoins,triggerLog,coins,signals,sellAlerts}){
  const fmt=p=>{
    if(!p)return"—";
    if(p<0.00001)return`$${p.toFixed(8)}`;if(p<0.01)return`$${p.toFixed(6)}`;
    if(p<1)return`$${p.toFixed(4)}`;if(p<100)return`$${p.toFixed(2)}`;
    return`$${p.toLocaleString(undefined,{maximumFractionDigits:2})}`;
  };
  const timeStr=t=>{
    if(!t)return"—";
    const d=new Date(t);
    return d.toLocaleDateString()+' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
  };
  const timeAgo=t=>{
    if(!t)return"—";
    const s=Math.floor((Date.now()-new Date(t))/1000);
    if(s<60)return`${s}s ago`;if(s<3600)return`${Math.floor(s/60)}m ago`;
    if(s<86400)return`${Math.floor(s/3600)}h ago`;return`${Math.floor(s/86400)}d ago`;
  };

  if(trackedCoins.length===0) return (
    <div style={{textAlign:"center",padding:"80px 24px",color:"#2a3a5a"}}>
      <div style={{fontSize:32,marginBottom:16}}>📈</div>
      <div style={{fontSize:13,marginBottom:8,color:"#3a4a6a"}}>No coins being tracked yet</div>
      <div style={{fontSize:11,lineHeight:1.8,color:"#2a3a5a"}}>
        Use the <span style={{color:"#0e7afe"}}>📈 TRACK</span> button in the scanner to pin specific coins like ICP.<br/>
        Every BUY and SELL trigger will be logged with price + timestamp.<br/>
        Over time you'll build a full track record to evaluate signal accuracy.
      </div>
    </div>
  );

  // ── Build summary stats for all tracked coins ────────────────────────────
  const summaryRows = trackedCoins.map(coinId=>{
    const coin=coins.find(c=>c.id===coinId);
    const sig=signals[coinId]||{overall:"NEUTRAL",score:50,alpha:50};
    const rawLogs=triggerLog[coinId]||[];
    const cycles=[]; let pendingBuy=null;
    rawLogs.forEach(l=>{
      if(l.type==="BUY"&&!pendingBuy) pendingBuy=l;
      else if(l.type==="SELL"&&pendingBuy){
        cycles.push({pnl:((l.price-pendingBuy.price)/pendingBuy.price)*100});
        pendingBuy=null;
      }
    });
    const openBuy=pendingBuy;
    const currentPrice=coin?.price;
    const openPnl=openBuy&&currentPrice?((currentPrice-openBuy.price)/openBuy.price)*100:null;
    const wins=cycles.filter(c=>c.pnl>0).length;
    const avgPnl=cycles.length?cycles.reduce((a,c)=>a+c.pnl,0)/cycles.length:null;
    const totalPnl=cycles.reduce((a,c)=>a+c.pnl,0)+(openPnl||0);
    const winRate=cycles.length?Math.round(wins/cycles.length*100):null;
    return {coinId,coin,sig,cycles:cycles.length,winRate,avgPnl,totalPnl,openPnl,hasSellAlert:!!sellAlerts[coinId]};
  }).sort((a,b)=>(b.winRate??-1)-(a.winRate??-1)); // rank by win rate

  return (
    <div style={{padding:"20px 24px"}}>

      {/* ── Summary comparison table ───────────────────────────────────────── */}
      {trackedCoins.length>0&&(
        <div style={{marginBottom:24}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
            <div style={{fontSize:9,letterSpacing:"0.2em",color:"#4a5a7a"}}>COMPARISON — RANKED BY WIN RATE</div>
            <div style={{fontSize:9,color:BACKEND_URL?"#00e5a0":"#2a3a5a"}}>{BACKEND_URL?"🟢 Backend connected · triggers logged 24/7":"📅 7-day history replayed · deploy backend for 24/7 logging"}</div>
          </div>
          <div style={{background:"#0a0f1a",borderRadius:10,border:"1px solid #1c2535",overflow:"hidden"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
              <thead>
                <tr style={{borderBottom:"1px solid #1c2535",background:"#060b14"}}>
                  {[["RANK","40px"],["COIN","140px"],["SIGNAL","80px"],["α SCORE","70px"],["CYCLES","60px"],["WIN RATE","80px"],["AVG RETURN","90px"],["TOTAL P&L","90px"],["OPEN P&L","90px"],["","50px"]].map(([h,w])=>(
                    <th key={h} style={{padding:"8px 12px",textAlign:"left",fontSize:8,letterSpacing:"0.15em",color:"#3a4a6a",fontWeight:600,width:w}}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {summaryRows.map((r,i)=>{
                  const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`;
                  const sigCol=r.sig.overall==="BUY"?SC.BUY:r.sig.overall==="SELL"?SC.SELL:"#8896b3";
                  return (
                    <tr key={r.coinId} style={{borderBottom:"1px solid #0d1525",background:i%2===0?"#0a0f1a":"#070c15"}}>
                      <td style={{padding:"10px 12px",fontSize:13}}>{medal}</td>
                      <td style={{padding:"10px 12px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:7}}>
                          <div style={{width:6,height:6,borderRadius:"50%",background:r.coin?.color||"#8896b3",flexShrink:0}}/>
                          <div>
                            <span style={{fontWeight:700,color:"#e2e8f0"}}>{r.coin?.symbol||r.coinId.toUpperCase()}</span>
                            {r.hasSellAlert&&<span style={{fontSize:7,marginLeft:5,color:SC.SELL}}>🔔</span>}
                          </div>
                        </div>
                      </td>
                      <td style={{padding:"10px 12px"}}>
                        <span style={{fontSize:9,padding:"2px 7px",borderRadius:3,color:sigCol,background:sigCol+"15",border:`1px solid ${sigCol}33`,fontWeight:700}}>{r.sig.overall}</span>
                      </td>
                      <td style={{padding:"10px 12px"}}>
                        <span style={{color:r.sig.alpha>=65?SC.BUY:r.sig.alpha<=40?SC.SELL:"#8896b3",fontWeight:600}}>{r.sig.alpha}</span>
                      </td>
                      <td style={{padding:"10px 12px",color:"#8896b3"}}>{r.cycles||"—"}</td>
                      <td style={{padding:"10px 12px"}}>
                        {r.winRate!==null
                          ?<div style={{display:"flex",alignItems:"center",gap:6}}>
                              <div style={{width:36,height:4,borderRadius:2,background:"#1c2535",overflow:"hidden"}}>
                                <div style={{width:`${r.winRate}%`,height:"100%",background:r.winRate>=50?SC.BUY:SC.SELL,borderRadius:2}}/>
                              </div>
                              <span style={{color:r.winRate>=50?SC.BUY:SC.SELL,fontWeight:700}}>{r.winRate}%</span>
                            </div>
                          :<span style={{color:"#2a3a5a"}}>—</span>}
                      </td>
                      <td style={{padding:"10px 12px",fontWeight:600,color:r.avgPnl===null?"#2a3a5a":r.avgPnl>=0?SC.BUY:SC.SELL}}>
                        {r.avgPnl!==null?`${r.avgPnl>=0?"+":""}${r.avgPnl.toFixed(2)}%`:"—"}
                      </td>
                      <td style={{padding:"10px 12px",fontWeight:700,color:r.totalPnl===0?"#2a3a5a":r.totalPnl>0?SC.BUY:SC.SELL}}>
                        {r.cycles>0||r.openPnl?`${r.totalPnl>=0?"+":""}${r.totalPnl.toFixed(2)}%`:"—"}
                      </td>
                      <td style={{padding:"10px 12px",fontWeight:600,color:r.openPnl===null?"#2a3a5a":r.openPnl>=0?SC.BUY:SC.SELL}}>
                        {r.openPnl!==null?`${r.openPnl>=0?"+":""}${r.openPnl.toFixed(2)}%`:"—"}
                      </td>
                      <td style={{padding:"10px 12px"}}>
                        <button onClick={()=>{setTrackedCoins(tc=>tc.filter(id=>id!==r.coinId));replayedCoins.current.delete(r.coinId);setTriggerLog(tl=>{const n={...tl};delete n[r.coinId];return n;});}}
                          style={{background:"none",border:"1px solid #1c2535",borderRadius:4,padding:"2px 7px",color:"#3a4a6a",fontSize:8,fontFamily:"inherit",cursor:"pointer"}}>✕</button>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {trackedCoins.map(coinId=>{
        const coin=coins.find(c=>c.id===coinId);
        const sig=signals[coinId]||{overall:"NEUTRAL",score:50,alpha:50};
        const logs=(triggerLog[coinId]||[]).slice().reverse(); // newest first
        const currentPrice=coin?.price;
        const hasSellAlert=!!sellAlerts[coinId];

        // Compute completed cycles (BUY→SELL pairs) and stats
        const cycles=[];
        const rawLogs=(triggerLog[coinId]||[]);
        let pendingBuy=null;
        rawLogs.forEach(l=>{
          if(l.type==="BUY"&&!pendingBuy) pendingBuy=l;
          else if((l.type==="SELL"||l.type==="PEAK_EXIT")&&pendingBuy){
            const pnl=((l.price-pendingBuy.price)/pendingBuy.price)*100;
            cycles.push({buy:pendingBuy,sell:l,pnl,isPeak:l.type==="PEAK_EXIT"});
            pendingBuy=null;
          }
        });
        // Open position
        const openBuy=pendingBuy;
        const openPnl=openBuy&&currentPrice?((currentPrice-openBuy.price)/openBuy.price)*100:null;

        const wins=cycles.filter(c=>c.pnl>0).length;
        const avgPnl=cycles.length?cycles.reduce((a,c)=>a+c.pnl,0)/cycles.length:null;

        return (
          <div key={coinId} style={{background:"#0a0f1a",border:`1px solid ${hasSellAlert?"#ff3d7155":"#1c2535"}`,borderRadius:12,padding:"16px 18px",marginBottom:16}}>

                {hasSellAlert&&<span style={{fontSize:8,padding:"2px 7px",borderRadius:3,background:"rgba(255,61,113,0.12)",color:SC.SELL,border:"1px solid #ff3d7144",animation:"pulse 1.5s infinite"}}>🔔 SELL ALERT</span>}
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:12,color:"#e2e8f0",fontWeight:600}}>{fmt(currentPrice)}</span>
                <span style={{fontSize:9,color:"#3a4a6a"}}>α {sig.alpha}</span>
                <button onClick={()=>{setTrackedCoins(tc=>tc.filter(id=>id!==coinId));replayedCoins.current.delete(coinId);setTriggerLog(tl=>{const n={...tl};delete n[coinId];return n;});}}
                  style={{background:"none",border:"1px solid #1c2535",borderRadius:4,padding:"3px 8px",color:"#3a4a6a",fontSize:8,fontFamily:"inherit",cursor:"pointer"}}>✕ UNTRACK</button>
              </div>
            </div>

            {/* Stats row */}
            {(cycles.length>0||openBuy)&&(
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:12}}>
                {[
                  ["CYCLES",cycles.length,"#8896b3"],
                  ["WIN RATE",cycles.length?`${Math.round(wins/cycles.length*100)}%`:"—",wins/Math.max(cycles.length,1)>=0.5?SC.BUY:SC.SELL],
                  ["AVG RETURN",avgPnl!==null?`${avgPnl>=0?"+":""}${avgPnl.toFixed(2)}%`:"—",avgPnl===null?"#8896b3":avgPnl>=0?SC.BUY:SC.SELL],
                  ["OPEN P&L",openPnl!==null?`${openPnl>=0?"+":""}${openPnl.toFixed(2)}%`:"—",openPnl===null?"#3a4a6a":openPnl>=0?SC.BUY:SC.SELL],
                ].map(([l,v,c])=>(
                  <div key={l} style={{background:"#060b14",borderRadius:6,padding:"8px 10px",border:"1px solid #111d2e"}}>
                    <div style={{fontSize:8,color:"#3a4a6a",letterSpacing:"0.1em",marginBottom:3}}>{l}</div>
                    <div style={{fontSize:14,fontWeight:700,color:c}}>{v}</div>
                  </div>
                ))}
              </div>
            )}

            {/* Open position */}
            {openBuy&&(
              <div style={{background:"rgba(0,229,160,0.05)",border:"1px solid #00e5a033",borderRadius:8,padding:"10px 12px",marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <span style={{fontSize:9,color:SC.BUY,fontWeight:700,letterSpacing:"0.1em"}}>▶ OPEN POSITION</span>
                    <span style={{fontSize:10,color:"#8896b3",marginLeft:10}}>BUY at {fmt(openBuy.price)} · {timeAgo(openBuy.time)}</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
                    <span style={{fontSize:13,fontWeight:700,color:openPnl>=0?SC.BUY:SC.SELL}}>{openPnl!==null?`${openPnl>=0?"+":""}${openPnl.toFixed(2)}%`:"—"}</span>
                    {openPnl!==null&&openPnl>0&&<span style={{fontSize:8,color:"#ffd166"}}>⚡ watch RSI for peak exit</span>}
                  </div>
                </div>
                <div style={{fontSize:9,color:"#3a4a6a",marginTop:4}}>Entry alpha: {openBuy.alpha} · {openBuy.reason}</div>
              </div>
            )}

            {/* Trigger log */}
            {logs.length>0?(
              <div style={{background:"#060b14",borderRadius:8,overflow:"hidden",border:"1px solid #111d2e"}}>
                <div style={{padding:"7px 12px",borderBottom:"1px solid #111d2e",display:"flex",justifyContent:"space-between"}}>
                  <span style={{fontSize:9,color:"#3a4a6a",letterSpacing:"0.15em"}}>TRIGGER LOG</span>
                  <span style={{fontSize:9,color:"#2a3a5a"}}>{logs.length} events</span>
                </div>
                <div style={{maxHeight:200,overflowY:"auto"}}>
                  {logs.map((l,i)=>{
                    // Find matching cycle result for this log entry
                    const cycle=cycles.find(c=>c.buy.time===l.time||c.sell.time===l.time);
                    const cyclePnl=cycle?((l.type==="SELL"||l.type==="PEAK_EXIT")?cycle.pnl:null):null;
                    const cycleIsPeak=cycle?.isPeak||false;
                    return (
                      <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",borderBottom:i<logs.length-1?"1px solid #0d1525":"none",background:i%2===0?"transparent":"#070c15"}}>
                        <div style={{width:6,height:6,borderRadius:"50%",background:l.type==="BUY"?SC.BUY:l.type==="PEAK_EXIT"?"#ffd166":SC.SELL,flexShrink:0}}/>
                        <span style={{fontSize:10,fontWeight:700,color:l.type==="BUY"?SC.BUY:l.type==="PEAK_EXIT"?"#ffd166":SC.SELL,minWidth:50}}>{l.type==="PEAK_EXIT"?"⚡ PEAK":l.type}</span>
                        <span style={{fontSize:10,color:"#e2e8f0",minWidth:70}}>{fmt(l.price)}</span>
                        <span style={{fontSize:9,color:"#3a4a6a",flex:1}}>{timeStr(l.time)}{l.replayed&&<span style={{fontSize:7,marginLeft:6,padding:"1px 4px",borderRadius:2,background:"#1c2535",color:"#2a3a5a"}}>HIST</span>}</span>
                        <span style={{fontSize:9,color:"#2a3a5a",minWidth:40}}>α {l.alpha}</span>
                        {cyclePnl!==null&&(
                          <span style={{fontSize:10,fontWeight:700,color:cycleIsPeak?"#ffd166":cyclePnl>=0?SC.BUY:SC.SELL,minWidth:50,textAlign:"right"}}>{cycleIsPeak?"⚡ ":""}{cyclePnl>=0?"+":""}{cyclePnl.toFixed(2)}%</span>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            ):(
              <div style={{fontSize:11,color:"#2a3a5a",textAlign:"center",padding:"12px 0"}}>No triggers logged yet — watching for BUY/SELL signals...</div>
            )}
          </div>
        );
      })}
      <div style={{fontSize:10,color:"#1c2535",padding:"8px 0"}}>⚠ Session triggers logged in-memory · Pinned coins persist across reloads · Not financial advice</div>
    </div>
  );
}

          {!isClosed&&<button onClick={()=>onClose(w.id)} style={{background:"rgba(255,61,113,0.08)",border:"1px solid #ff3d7133",borderRadius:5,padding:"4px 12px",color:SC.SELL,fontSize:9,fontFamily:"inherit",cursor:"pointer"}}>CLOSE POSITION</button>}
          <button onClick={()=>onRemove(w.id)} style={{background:"none",border:"1px solid #1c2535",borderRadius:5,padding:"4px 12px",color:"#3a4a6a",fontSize:9,fontFamily:"inherit",cursor:"pointer",marginLeft:"auto"}}>✕ REMOVE</button>
        </div>
      </div>
    );
  };
  const clearAll=()=>{if(window.confirm("Clear all watchlist entries?"))onClear();};

  if(watchlist.length===0) return (
    <div style={{textAlign:"center",padding:"80px 24px",color:"#2a3a5a"}}>
      <div style={{fontSize:32,marginBottom:16}}>📡</div>
      <div style={{fontSize:13,marginBottom:8,color:"#3a4a6a"}}>No signals tracked yet</div>
      <div style={{fontSize:11,lineHeight:1.7}}>Coins that hit <span style={{color:SC.BUY}}>100% BUY</span> will be auto-logged here.<br/>You can also manually add any coin using the <span style={{color:"#0e7afe"}}>+ WATCH</span> button in the scanner.</div>
      <div style={{fontSize:10,color:"#1c2535",marginTop:24}}>💾 Entries persist across page reloads</div>
    </div>
  );
  const allWithPnl=watchlist.filter(w=>{const live=coins.find(c=>c.id===w.id);const cp=w.closed?w.closePrice:live?.price;return cp&&w.entryPrice;});
  const pnls=allWithPnl.map(w=>{const live=coins.find(c=>c.id===w.id);const cp=w.closed?w.closePrice:live?.price;return((cp-w.entryPrice)/w.entryPrice)*100;});
  const avgPnl=pnls.length?pnls.reduce((a,b)=>a+b,0)/pnls.length:null;
  const wins=pnls.filter(p=>p>0).length;
  return (
    <div style={{padding:"20px 24px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontSize:9,color:"#3a4a6a",letterSpacing:"0.15em"}}>💾 AUTO-SAVED · survives page reloads</div>
        <button onClick={clearAll} style={{background:"none",border:"1px solid #1c2535",borderRadius:5,padding:"4px 12px",color:"#3a4a6a",fontSize:9,fontFamily:"inherit",cursor:"pointer",letterSpacing:"0.08em"}}>🗑 CLEAR ALL</button>
      </div>
      {pnls.length>0&&(
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
          {[["TRACKED",watchlist.length,"#8896b3"],["OPEN",open.length,"#0e7afe"],
            ["WIN RATE",`${pnls.length?Math.round(wins/pnls.length*100):0}%`,wins/pnls.length>=0.5?SC.BUY:SC.SELL],
            ["AVG RETURN",avgPnl!==null?`${avgPnl>=0?"+":""}${avgPnl.toFixed(2)}%`:"—",avgPnl>=0?SC.BUY:SC.SELL],
          ].map(([lbl,val,col])=>(
            <div key={lbl} style={{background:"#0a0f1a",border:"1px solid #1c2535",borderRadius:8,padding:"10px 14px"}}>
              <div style={{fontSize:9,color:"#4a5a7a",letterSpacing:"0.12em",marginBottom:4}}>{lbl}</div>
              <div style={{fontSize:18,fontWeight:700,color:col}}>{val}</div>
            </div>
          ))}
        </div>
      )}
      {open.length>0&&(<><div style={{fontSize:9,letterSpacing:"0.2em",color:"#4a5a7a",marginBottom:10}}>OPEN POSITIONS ({open.length})</div>{open.map(w=><WatchRow key={w.id+w.entryTime} w={w} isClosed={false}/>)}</>)}
      {closed.length>0&&(<><div style={{fontSize:9,letterSpacing:"0.2em",color:"#4a5a7a",margin:"20px 0 10px"}}>CLOSED POSITIONS ({closed.length})</div>{closed.map(w=><WatchRow key={w.id+w.entryTime} w={w} isClosed={true}/>)}</>)}
      <div style={{fontSize:10,color:"#1c2535",padding:"16px 0"}}>⚠ Session-based tracker — resets on page reload · Not financial advice</div>
    </div>
  );
}
function App(){
  const [coins,setCoins]             = useState([]);
  const [loading,setLoading]         = useState(true);
  const [loadingMore,setLoadingMore] = useState(false);
  const [lastUpdate,setLastUpdate]   = useState(null);
  const [selectedCoin,setSelectedCoin] = useState(null);
  const [histories,setHistories]     = useState({});
  const [search,setSearch]           = useState("");
  const [sortCol,setSortCol]         = useState("rank");
  const [sortDir,setSortDir]         = useState("asc");
  const [filterSig,setFilterSig]     = useState("ALL");
  const [newsData,setNewsData]       = useState({});
  const [newsFetching,setNewsFetching] = useState({});
  const [cfg,setCfg]                 = useState({...DEFAULT_SETTINGS});
  const [showSettings,setShowSettings] = useState(false);
  const [showBacktest,setShowBacktest] = useState(false);
  const [mainTab,setMainTab]         = useState("scanner");
  const [watchlist,setWatchlist]     = useState(()=>{
    try{
      const saved=localStorage.getItem("nexus_watchlist");
      if(!saved) return [];
      const parsed=JSON.parse(saved);
      return parsed.map(w=>({...w,entryTime:new Date(w.entryTime),closeTime:w.closeTime?new Date(w.closeTime):undefined}));
    }catch{return [];}
  });
  const prevSignals                  = useRef({});
  const replayedCoins                = useRef(new Set()); // track which coins already had history replayed
  const [sellAlerts,setSellAlerts]   = useState({});  // {coinId: {firedAt, alpha, fromWatchlist}}
  const [trackedCoins,setTrackedCoins] = useState(()=>{
    try{const s=localStorage.getItem("nexus_tracked");return s?JSON.parse(s):[];}catch{return [];}
  });
  const [triggerLog,setTriggerLog]   = useState({});  // {coinId: [{type,price,alpha,time,reason}]}

  // Persist watchlist to localStorage on every change
  useEffect(()=>{
    try{ localStorage.setItem("nexus_watchlist", JSON.stringify(watchlist)); }catch{}
  },[watchlist]);
  // Persist tracked coins
  useEffect(()=>{
    try{ localStorage.setItem("nexus_tracked", JSON.stringify(trackedCoins)); }catch{}
  },[trackedCoins]);

  // Extra coins to track outside top 200 — add CoinGecko IDs here
  const EXTRA_COIN_IDS = ['non-playable-coin','clearpool','verge','velo','zigchain'];

  const fetchMarket=useCallback(async()=>{
    try {
      setLoadingMore(true);
      const sleep=ms=>new Promise(r=>setTimeout(r,ms));
      const pages=[];
      for(let page=1;page<=4;page++){
        try{
          const r=await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=50&page=${page}&sparkline=true&price_change_percentage=24h`);
          if(r.ok){
            const d=await r.json();
            pages.push(...d);
            if(pages.length>0){
              const mapped=pages.filter(c=>!BLACKLIST.has(c.id)).map((c,i)=>({
                id:c.id,symbol:c.symbol?.toUpperCase(),name:c.name,rank:c.market_cap_rank||i+1,
                price:c.current_price,change:c.price_change_percentage_24h,
                color:`hsl(${(i*37)%360},70%,55%)`,sparkline:c.sparkline_in_7d?.price||[],
              }));
              setCoins(mapped);
              const h={};mapped.forEach(c=>{if(c.sparkline?.length>10)h[c.id]=c.sparkline;});
              setHistories(h);setLoading(false);
            }
          }
        }catch{}
        if(page<4) await sleep(600);
      }
      // Fetch extra coins not in top 200 (fetched separately, always first)
      if(EXTRA_COIN_IDS.length){
        try{
          await sleep(4000); // wait 4s after main pages to avoid rate limit
          const ids=EXTRA_COIN_IDS.join(',');
          const r=await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&sparkline=true&price_change_percentage=24h`);
          if(r.ok){
            const extras=await r.json();
            const extraMapped=extras.filter(c=>!BLACKLIST.has(c.id)).map((c,i)=>({
              id:c.id,symbol:c.symbol?.toUpperCase(),name:c.name,rank:999-i,
              price:c.current_price,change:c.price_change_percentage_24h,
              color:`hsl(${(i*73+180)%360},70%,55%)`,sparkline:c.sparkline_in_7d?.price||[],
              extra:true,
            }));
            if(extraMapped.length){
              setCoins(prev=>{
                const existingIds=new Set(prev.map(c=>c.id));
                const newExtras=extraMapped.filter(c=>!existingIds.has(c.id));
                return newExtras.length?[...prev,...newExtras]:prev;
              });
              setHistories(prev=>{
                const h={...prev};
                extraMapped.forEach(c=>{if(c.sparkline?.length>10)h[c.id]=c.sparkline;});
                return h;
              });
              console.log(`✓ Extra coins loaded: ${extraMapped.map(c=>c.symbol).join(', ')}`);
            }
          }
        }catch(e){console.warn('Extra coins fetch failed:',e.message);}
      }
      setLastUpdate(new Date());setLoadingMore(false);
    } catch{setLoading(false);setLoadingMore(false);}
  },[]);

  useEffect(()=>{fetchMarket();const t=setInterval(fetchMarket,60000);return()=>clearInterval(t);},[fetchMarket]);

  // Auto-refresh tracked coins + trigger logs from backend every 3 minutes
  useEffect(()=>{
    if(!BACKEND_URL) return;
    const refreshFromBackend=()=>{
      const headers={'Content-Type':'application/json'};
      if(BACKEND_API_KEY) headers['X-API-Key']=BACKEND_API_KEY;
      // Refresh tracked coins
      fetch(`${BACKEND_URL}/api/tracked`,{headers})
        .then(r=>r.json())
        .then(data=>{
          if(Array.isArray(data)&&data.length){
            const ids=data.map(d=>d.coinId);
            setTrackedCoins(tc=>{
              const merged=[...new Set([...tc,...ids])];
              return merged.length!==tc.length?merged:tc;
            });
          }
        }).catch(()=>{});
      // Refresh trigger logs
      fetch(`${BACKEND_URL}/api/alltriggers`,{headers})
        .then(r=>r.json())
        .then(data=>{
          if(data&&typeof data==='object'&&Object.keys(data).length){
            setTriggerLog(data);
          }
        }).catch(()=>{});
    };
    const t=setInterval(refreshFromBackend, 3*60*1000); // every 3 minutes
    return()=>clearInterval(t);
  },[]);

  const signals=useMemo(()=>{
    const s={};
    coins.forEach(c=>{
      const h=histories[c.id];
      if(h&&h.length>15&&c.price){
        const r=computeSignals(h,c.price,cfg);
        s[c.id]={overall:r.overall,score:r.score,alpha:r.alpha||50,earlyTrend:r.earlyTrend||false};
      } else s[c.id]={overall:"NEUTRAL",score:50,alpha:50,earlyTrend:false};
    });
    return s;
  },[coins,histories,cfg]);

  // Replay 7-day sparkline history to pre-populate trigger log
  const replayHistory = useCallback((coinId, history, currentPrice, buyThresh, sellThresh)=>{
    if(!history||history.length<20) return [];
    const logs=[];
    let prevAlpha=null;
    const step=1; // check every bar
    for(let i=20;i<history.length;i++){
      const slice=history.slice(0,i+1);
      const price=history[i];
      const {alpha}=computeAlphaScore(slice,price,cfg);
      if(prevAlpha!==null){
        // Estimate timestamp: sparkline is hourly, count back from now
        const hoursAgo=history.length-1-i;
        const t=new Date(Date.now()-hoursAgo*60*60*1000);
        // BUY: alpha crosses up through buyThresh
        if(prevAlpha<buyThresh && alpha>=buyThresh){
          if(!logs.length||logs[logs.length-1].type!=="BUY")
            logs.push({type:"BUY",price,alpha,time:t,reason:`α ${alpha} crossed BUY threshold (replayed)`,replayed:true});
        }
        // PEAK EXIT: RSI crosses into overbought while position is open
        const lastLogType=logs.length?logs[logs.length-1].type:null;
        const hasOpenBuyR=lastLogType==="BUY";
        if(hasOpenBuyR){
          const rec2=slice.slice(-14);
          const changes=rec2.slice(1).map((p,i)=>p-rec2[i]);
          const g2=changes.filter(x=>x>0).reduce((a,b)=>a+b,0)/14;
          const l2=Math.abs(changes.filter(x=>x<0).reduce((a,b)=>a+b,0))/14;
          const rsiNow=l2===0?100:100-100/(1+g2/l2);
          const prevSlice=history.slice(0,i);
          let rsiPrev=null;
          if(prevSlice.length>14){
            const ch2=prevSlice.slice(-14);
            const changes2=ch2.slice(1).map((p,j)=>p-ch2[j]);
            const g3=changes2.filter(x=>x>0).reduce((a,b)=>a+b,0)/14;
            const l3=Math.abs(changes2.filter(x=>x<0).reduce((a,b)=>a+b,0))/14;
            rsiPrev=l3===0?100:100-100/(1+g3/l3);
          }
          if(rsiPrev!==null && rsiPrev<65 && rsiNow>=65){
            if(lastLogType!=="PEAK_EXIT"&&lastLogType!=="SELL")
              logs.push({type:"PEAK_EXIT",price,alpha,time:t,reason:`RSI ${rsiNow.toFixed(1)} entered overbought — peak exit (replayed)`,replayed:true});
          }
        }
        // SELL: alpha drops below sellThresh (only if no open buy or no peak exit)
        if(prevAlpha>sellThresh && alpha<=sellThresh){
          if(!logs.length||(logs[logs.length-1].type!=="SELL"&&logs[logs.length-1].type!=="PEAK_EXIT"))
            logs.push({type:"SELL",price,alpha,time:t,reason:`α ${alpha} dropped below SELL threshold (replayed)`,replayed:true});
        }
      }
      prevAlpha=alpha;
    }
    return logs;
  },[cfg]);

  // On startup: load tracked coins + all triggers from backend
  useEffect(()=>{
    if(!BACKEND_URL) return;
    const headers={'Content-Type':'application/json'};
    if(BACKEND_API_KEY) headers['X-API-Key']=BACKEND_API_KEY;

    // Load tracked coins list from backend
    fetch(`${BACKEND_URL}/api/tracked`,{headers})
      .then(r=>r.json())
      .then(data=>{
        if(Array.isArray(data)&&data.length){
          const ids=data.map(d=>d.coinId);
          setTrackedCoins(tc=>{
            const merged=[...new Set([...tc,...ids])];
            return merged;
          });
          console.log(`✓ Loaded ${ids.length} tracked coins from backend`);
        }
      }).catch(e=>console.warn('Failed to load tracked coins from backend:',e.message));

    // Load all trigger logs from backend
    fetch(`${BACKEND_URL}/api/alltriggers`,{headers})
      .then(r=>r.json())
      .then(data=>{
        if(data&&typeof data==='object'){
          setTriggerLog(data);
          console.log(`✓ Loaded trigger logs for ${Object.keys(data).length} coins from backend`);
        }
      }).catch(e=>console.warn('Failed to load triggers from backend:',e.message));
  },[]);

  // For manually tracked coins not yet in backend, do sparkline replay as fallback
  useEffect(()=>{
    if(!Object.keys(histories).length) return;
    const buyThresh=cfg.alphaThresh||65;
    const sellThresh=cfg.alphaSellThresh||40;
    trackedCoins.forEach(coinId=>{
      if(replayedCoins.current.has(coinId)) return;
      replayedCoins.current.add(coinId);
      if(BACKEND_URL) return; // backend handles this
      const history=histories[coinId];
      const coin=coins.find(c=>c.id===coinId);
      if(!history||!coin) return;
      const replayed=replayHistory(coinId,history,coin.price,buyThresh,sellThresh);
      if(replayed.length){
        setTriggerLog(tl=>{
          if(tl[coinId]?.length) return tl;
          return {...tl,[coinId]:replayed};
        });
      }
    });
  },[trackedCoins,histories,coins]);

  // Auto-detect 100% BUY signals and log them to watchlist
  useEffect(()=>{
    if(!coins.length) return;
    coins.forEach(c=>{
      const sig=signals[c.id];
      if(!sig) return;
      const prev=prevSignals.current[c.id];
      // Fire when score hits 100 and wasn't 100 before (new signal)
      const isHighAlpha=(sig.alpha||0)>=65&&sig.overall==="BUY";
      const wasHighAlpha=(prev?.alpha||0)>=65&&prev?.overall==="BUY";
      if(isHighAlpha&&!wasHighAlpha){
        const h=histories[c.id]||[];
        const {results}=computeSignals(h,c.price,cfg);
        const triggeredIndicators=results.filter(r=>r.sig==="BUY").map(r=>r.label);
        setWatchlist(wl=>{
          // Don't double-add same coin if already watching
          if(wl.find(w=>w.id===c.id&&!w.closed)) return wl;
          return [{
            id:c.id, symbol:c.symbol, name:c.name, color:c.color, rank:c.rank,
            entryPrice:c.price, entryTime:new Date(), score:sig.score,
            indicators:triggeredIndicators, autoLogged:true, closed:false,
          }, ...wl];
        });
      }
      // ── Sell alert: alpha drops below sellThresh after being above buyThresh ──
      const sellThresh = cfg.alphaSellThresh||40;
      const buyThresh  = cfg.alphaThresh||65;
      const wasBuy  = (prev?.alpha||0) >= buyThresh;
      const nowWeak = (sig.alpha||0)   <= sellThresh;
      if(wasBuy && nowWeak){
        setSellAlerts(sa=>({...sa,[c.id]:{firedAt:new Date(),alpha:sig.alpha,fromWatchlist:!!watchlist.find(w=>w.id===c.id&&!w.closed)}}));
      }
      // Clear sell alert if alpha recovers above buyThresh again
      if((sig.alpha||0) >= buyThresh){
        setSellAlerts(sa=>{if(!sa[c.id])return sa;const n={...sa};delete n[c.id];return n;});
      }

      // ── Log triggers for tracked coins ───────────────────────────────────
      if(trackedCoins.includes(c.id) && prev){
        const wasAboveBuy  = (prev.alpha||0) >= buyThresh;
        const nowAboveBuy  = (sig.alpha||0)  >= buyThresh;
        const wasBelowSell = (prev.alpha||0) <= sellThresh;
        const nowBelowSell = (sig.alpha||0)  <= sellThresh;

        // Get RSI for peak exit detection
        const h=histories[c.id]||[];
        const currentRsi = h.length>15 ? (()=>{
          const ch=h.slice(1).map((p,i)=>p-h[i]),rec=ch.slice(-14);
          const g=rec.filter(x=>x>0).reduce((a,b)=>a+b,0)/14;
          const l=Math.abs(rec.filter(x=>x<0).reduce((a,b)=>a+b,0))/14;
          return l===0?100:100-100/(1+g/l);
        })() : null;
        const prevRsi = prev.rsiValue||null;
        const rsiJustOverbought = currentRsi!==null && prevRsi!==null && prevRsi<65 && currentRsi>=65;

        // Check if there is an open BUY position (last log entry is BUY)
        const lastLog=(triggerLog[c.id]||[]);
        const hasOpenBuy = lastLog.length>0 && lastLog[lastLog.length-1].type==="BUY";

        // BUY trigger: alpha crosses up through buyThresh
        if(!wasAboveBuy && nowAboveBuy){
          setTriggerLog(tl=>{
            const pl=tl[c.id]||[];
            if(pl.length&&pl[pl.length-1].type==="BUY") return tl;
            return {...tl,[c.id]:[...pl,{type:"BUY",price:c.price,alpha:sig.alpha,time:new Date(),reason:`Alpha ${sig.alpha} crossed BUY threshold`}]};
          });
        }
        // PEAK EXIT: RSI just crossed into overbought (65+) while position is open
        else if(rsiJustOverbought && hasOpenBuy){
          setTriggerLog(tl=>{
            const pl=tl[c.id]||[];
            if(pl.length&&(pl[pl.length-1].type==="PEAK_EXIT"||pl[pl.length-1].type==="SELL")) return tl;
            return {...tl,[c.id]:[...pl,{type:"PEAK_EXIT",price:c.price,alpha:sig.alpha,time:new Date(),reason:`RSI ${currentRsi!==null?currentRsi.toFixed(1):"—"} entered overbought — peak exit`}]};
          });
        }
        // SELL trigger: alpha crosses down through sellThresh (after a BUY, if no peak exit yet)
        else if(!wasBelowSell && nowBelowSell && hasOpenBuy){
          setTriggerLog(tl=>{
            const pl=tl[c.id]||[];
            if(pl.length&&pl[pl.length-1].type==="SELL") return tl;
            return {...tl,[c.id]:[...pl,{type:"SELL",price:c.price,alpha:sig.alpha,time:new Date(),reason:`Alpha ${sig.alpha} dropped below SELL threshold`}]};
          });
        }
      }

      // Store rsiValue for peak exit detection next tick
      const h_rsi=histories[c.id]||[];
      const rv_store = h_rsi.length>15 ? (()=>{
        const ch=h_rsi.slice(1).map((p,i)=>p-h_rsi[i]),rec=ch.slice(-14);
        const g=rec.filter(x=>x>0).reduce((a,b)=>a+b,0)/14;
        const l=Math.abs(rec.filter(x=>x<0).reduce((a,b)=>a+b,0))/14;
        return l===0?100:100-100/(1+g/l);
      })() : null;
      prevSignals.current[c.id]={...sig, rsiValue:rv_store};
    });
  },[signals]);

  const dismissSellAlert=useCallback((id)=>{
    setSellAlerts(sa=>{const n={...sa};delete n[id];return n;});
  },[]);

  const addToWatchlist=useCallback((coin)=>{
    const h=histories[coin.id]||[];
    const sig=signals[coin.id]||{score:50};
    const {results}=computeSignals(h,coin.price,cfg);
    const triggeredIndicators=results.filter(r=>r.sig==="BUY").map(r=>r.label);
    setWatchlist(wl=>{
      if(wl.find(w=>w.id===coin.id&&!w.closed)) return wl; // already watching
      return [{
        id:coin.id, symbol:coin.symbol, name:coin.name, color:coin.color, rank:coin.rank,
        entryPrice:coin.price, entryTime:new Date(), score:sig.score,
        indicators:triggeredIndicators, autoLogged:false, closed:false,
      }, ...wl];
    });
  },[histories,signals,cfg]);

  const closeWatchlistEntry=useCallback((id)=>{
    setWatchlist(wl=>wl.map(w=>w.id===id&&!w.closed?{...w,closed:true,closeTime:new Date(),closePrice:coins.find(c=>c.id===id)?.price}:w));
  },[coins]);

  const removeWatchlistEntry=useCallback((id)=>{
    setWatchlist(wl=>wl.filter(w=>w.id!==id));
  },[]);

  const clearWatchlist=useCallback(()=>{
    setWatchlist([]);
    try{localStorage.removeItem("nexus_watchlist");}catch{}
  },[]);

  const watchlistCount=watchlist.filter(w=>!w.closed).length;

  const fetchNews=useCallback(async(coin)=>{
    setNewsFetching(prev=>({...prev,[coin.id]:true}));
    try {
      const resp=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:1000,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          system:`You are a crypto analyst. Return ONLY valid JSON:
{"signal":"BUY"|"SELL"|"NEUTRAL","sentiment":"Bullish"|"Bearish"|"Mixed"|"Neutral","score":<0-100>,"headline":"<10 words max>","summary":"<2 sentences>","catalysts":["<1>","<2>","<3>"],"risk":"Low"|"Medium"|"High","urgency":"HIGH"|"MED"|"LOW"}`,
          messages:[{role:"user",content:`Latest news, social buzz and whale activity for ${coin.name} (${coin.symbol}) in last 24-48h. Market signal?`}]
        })
      });
      const data=await resp.json();
      const text=data.content.map(b=>b.type==="text"?b.text:"").join("").trim();
      const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
      setNewsData(prev=>({...prev,[coin.id]:{...parsed,fetchedAt:new Date()}}));
    } catch {
      setNewsData(prev=>({...prev,[coin.id]:{error:true,fetchedAt:new Date()}}));
    }
    setNewsFetching(prev=>({...prev,[coin.id]:false}));
  },[]);

  const fmt=p=>{
    if(p===null||p===undefined)return"—";
    if(p<0.00001)return`$${p.toFixed(8)}`;if(p<0.01)return`$${p.toFixed(6)}`;
    if(p<1)return`$${p.toFixed(4)}`;if(p<100)return`$${p.toFixed(2)}`;
    return`$${p.toLocaleString(undefined,{maximumFractionDigits:2})}`;
  };

  const filtered=useMemo(()=>{
    let list=[...coins];
    if(search)list=list.filter(c=>c.name.toLowerCase().includes(search.toLowerCase())||c.symbol.toLowerCase().includes(search.toLowerCase()));
    if(filterSig!=="ALL")list=list.filter(c=>signals[c.id]?.overall===filterSig);
    list.sort((a,b)=>{
      let av,bv;
      if(sortCol==="rank"){av=a.rank;bv=b.rank;}
      else if(sortCol==="price"){av=a.price||0;bv=b.price||0;}
      else if(sortCol==="change"){av=a.change||0;bv=b.change||0;}
      else if(sortCol==="signal"){av=signals[a.id]?.score||50;bv=signals[b.id]?.score||50;}
      else{av=a.rank;bv=b.rank;}
      return sortDir==="asc"?av-bv:bv-av;
    });
    return list;
  },[coins,search,filterSig,signals,sortCol,sortDir]);

  const handleSort=col=>{
    if(sortCol===col)setSortDir(d=>d==="asc"?"desc":"asc");
    else{setSortCol(col);setSortDir(col==="rank"||col==="signal"?"asc":"desc");}
  };
  const sortArrow=col=>sortCol===col?(sortDir==="asc"?" ▲":" ▼"):" ·";

  const buyCount=coins.filter(c=>signals[c.id]?.overall==="BUY").length;
  const sellCount=coins.filter(c=>signals[c.id]?.overall==="SELL").length;
  const neutCount=coins.filter(c=>signals[c.id]?.overall==="NEUTRAL").length;
  const settingsChanged=JSON.stringify(cfg)!==JSON.stringify(DEFAULT_SETTINGS);
  const selectedCoinObj=selectedCoin?coins.find(c=>c.id===selectedCoin):null;

  if(selectedCoinObj){
    return (
      <div style={{background:"#060b14",height:"100vh",display:"flex",flexDirection:"column",fontFamily:"'IBM Plex Mono',monospace"}}>
        <div style={{borderBottom:"1px solid #111d2e",padding:"0 24px",height:48,display:"flex",alignItems:"center",justifyContent:"space-between",background:"#060b14",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:"#00e5a0"}} className="ld"/>
            <span style={{fontFamily:"Syne,sans-serif",fontWeight:900,fontSize:15,color:"#fff"}}>NEXUS<span style={{color:"#0e7afe"}}>://</span>TERMINAL</span>
            {settingsChanged&&<span style={{fontSize:8,padding:"2px 8px",borderRadius:3,background:"rgba(14,122,254,0.15)",color:"#0e7afe",border:"1px solid #0e7afe33"}}>CUSTOM SETTINGS</span>}
          </div>
          <span style={{fontSize:9,color:"#4a5a7a"}}>{lastUpdate?`↻ ${lastUpdate.toLocaleTimeString()}`:"LIVE"}</span>
        </div>
        <div style={{flex:1,overflow:"hidden",position:"relative"}}>
          <DetailView coin={selectedCoinObj} history={histories[selectedCoinObj.id]||[]} price={selectedCoinObj.price} change={selectedCoinObj.change}
            onBack={()=>setSelectedCoin(null)} newsData={newsData} newsFetching={newsFetching} fetchNews={fetchNews} cfg={cfg}
            onOpenSettings={()=>{setShowBacktest(false);setShowSettings(true);}}
            onOpenBacktest={()=>{setShowSettings(false);setShowBacktest(true);}}
            sellAlerts={sellAlerts} onDismissSell={dismissSellAlert}/>
          {showSettings&&<SettingsPanel cfg={cfg} setCfg={c=>{setCfg(c);setShowSettings(false);}} onClose={()=>setShowSettings(false)}/>}
          {showBacktest&&<BacktestPanel history={histories[selectedCoinObj.id]||[]} coin={selectedCoinObj} cfg={cfg} onClose={()=>setShowBacktest(false)}/>}
        </div>
      </div>
    );
  }

  return (
    <div style={{background:"#060b14",minHeight:"100vh",fontFamily:"'IBM Plex Mono',monospace",color:"#e2e8f0"}}>
      <div style={{borderBottom:"1px solid #111d2e",padding:"0 24px",height:52,display:"flex",alignItems:"center",justifyContent:"space-between",background:"#060b14",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:7,height:7,borderRadius:"50%",background:"#00e5a0"}} className="ld"/>
          <span style={{fontFamily:"Syne,sans-serif",fontWeight:900,fontSize:17,letterSpacing:"0.06em",color:"#fff"}}>NEXUS<span style={{color:"#0e7afe"}}>://</span>TERMINAL</span>
          <span style={{fontSize:9,color:"#2a3a5a",letterSpacing:"0.2em",borderLeft:"1px solid #1c2535",paddingLeft:14}}>MARKET SCANNER · TOP 200</span>
          {settingsChanged&&<span style={{fontSize:8,padding:"2px 8px",borderRadius:3,background:"rgba(14,122,254,0.15)",color:"#0e7afe",border:"1px solid #0e7afe33"}}>CUSTOM SETTINGS ACTIVE</span>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12,fontSize:10}}>
          <span style={{color:SC.BUY}}>▲ {buyCount} BUY</span>
          <span style={{color:"#3a4a6a"}}>·</span>
          <span style={{color:SC.NEUTRAL}}>— {neutCount} NEUTRAL</span>
          <span style={{color:"#3a4a6a"}}>·</span>
          <span style={{color:SC.SELL}}>▼ {sellCount} SELL</span>
          {Object.keys(sellAlerts).length>0&&<>
            <span style={{color:"#3a4a6a"}}>·</span>
            <span style={{fontSize:9,padding:"2px 8px",borderRadius:3,background:"rgba(255,61,113,0.15)",color:SC.SELL,border:"1px solid #ff3d7144",fontWeight:700,animation:"pulse 1.5s infinite"}}>
              🔔 {Object.keys(sellAlerts).length} SELL ALERT{Object.keys(sellAlerts).length>1?"S":""}
            </span>
          </>}
          <span style={{color:"#3a4a6a"}}>{lastUpdate?`↻ ${lastUpdate.toLocaleTimeString()}`:"LOADING..."}</span>
          {loadingMore&&<div style={{width:12,height:12,border:"2px solid #1c2535",borderTop:"2px solid #0e7afe",borderRadius:"50%"}} className="spin"/>}
          <button onClick={()=>setShowSettings(s=>!s)} style={{background:showSettings||settingsChanged?"rgba(14,122,254,0.15)":"none",border:`1px solid ${showSettings||settingsChanged?"#0e7afe44":"#1c2535"}`,borderRadius:5,padding:"5px 12px",color:showSettings||settingsChanged?"#0e7afe":"#4a5a7a",fontSize:9,fontFamily:"inherit",cursor:"pointer",letterSpacing:"0.1em"}}>⚙ SETTINGS</button>
        </div>
      </div>

      {/* MAIN TABS */}
      <div style={{display:"flex",borderBottom:"1px solid #111d2e",background:"#080e1a",position:"sticky",top:52,zIndex:99,padding:"0 24px"}}>
        {[["scanner","📊 SCANNER"],["watchlist",`📡 SIGNAL TRACKER${watchlistCount>0?" ("+watchlistCount+")":""}`],["tracker",`📈 ACCURACY TRACKER${trackedCoins.length>0?" ("+trackedCoins.length+")":""}`]].map(([key,label])=>(
          <button key={key} onClick={()=>setMainTab(key)} style={{background:"none",border:"none",borderBottom:`2px solid ${mainTab===key?"#0e7afe":"transparent"}`,padding:"10px 18px",fontSize:10,letterSpacing:"0.12em",fontFamily:"inherit",color:mainTab===key?"#0e7afe":key==="watchlist"&&watchlistCount>0?SC.BUY:"#3a4a6a",cursor:"pointer",transition:"all .15s",fontWeight:mainTab===key?700:400}}>{label}</button>
        ))}
      </div>

      {mainTab==="tracker"
        ?<AccuracyTracker trackedCoins={trackedCoins} setTrackedCoins={setTrackedCoins} triggerLog={triggerLog} coins={coins} signals={signals} sellAlerts={sellAlerts}/>
        :mainTab==="watchlist"
        ?<WatchlistTab watchlist={watchlist} coins={coins} onClose={closeWatchlistEntry} onRemove={removeWatchlistEntry} onOpen={id=>setSelectedCoin(id)} onClear={clearWatchlist} sellAlerts={sellAlerts} onDismissSell={dismissSellAlert}/>
        :<>
      <div style={{padding:"12px 24px",borderBottom:"1px solid #0d1525",display:"flex",alignItems:"center",gap:12,background:"#080e1a"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search coin name or symbol..."
          style={{background:"#0d1525",border:"1px solid #1c2535",borderRadius:6,padding:"7px 14px",color:"#e2e8f0",fontSize:11,fontFamily:"inherit",outline:"none",width:260}}/>
        <div style={{display:"flex",gap:6}}>
          {["ALL","BUY","NEUTRAL","SELL"].map(f=>(
            <button key={f} onClick={()=>setFilterSig(f)}
              style={{background:filterSig===f?(f==="BUY"?SC.BUY+"22":f==="SELL"?SC.SELL+"22":f==="NEUTRAL"?SC.NEUTRAL+"22":"#1c2535"):"none",border:`1px solid ${filterSig===f?(f==="BUY"?SC.BUY:f==="SELL"?SC.SELL:f==="NEUTRAL"?SC.NEUTRAL:"#4a5a7a"):"#1c2535"}`,borderRadius:5,padding:"5px 12px",color:filterSig===f?(f==="BUY"?SC.BUY:f==="SELL"?SC.SELL:f==="NEUTRAL"?SC.NEUTRAL:"#e2e8f0"):"#4a5a7a",fontSize:9,fontFamily:"inherit",cursor:"pointer",letterSpacing:"0.1em",fontWeight:filterSig===f?700:400}}>
              {f}
            </button>
          ))}
        </div>
        <span style={{fontSize:10,color:"#2a3a5a",marginLeft:"auto"}}>{filtered.length} coins · click row for analysis · + WATCH to track</span>
      </div>

      {loading?(
        <div style={{textAlign:"center",padding:"80px 0"}}>
          <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:16}}>{[0,1,2,3,4].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:"#0e7afe",animation:"bounce 1.2s infinite",animationDelay:`${i*0.15}s`}}/>)}</div>
          <div style={{fontSize:12,color:"#3a4a6a",letterSpacing:"0.2em"}}>LOADING TOP 200 COINS...</div>
        </div>
      ):(
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{borderBottom:"1px solid #111d2e"}}>
                {[["rank","#",50],["name","COIN",220],["price","PRICE",130],["change","24H",90],["signal","SIGNAL",110],["strength","STRENGTH",130],["spark","7D CHART",110],["watch","",60]].map(([col,label,w])=>(
                  <th key={col} onClick={()=>col!=="spark"&&col!=="name"&&col!=="strength"&&handleSort(col)}
                    style={{padding:"10px 16px",textAlign:col==="price"||col==="change"||col==="signal"?"right":"left",fontSize:9,letterSpacing:"0.15em",color:sortCol===col?"#0e7afe":"#3a4a6a",fontWeight:600,width:w,cursor:col==="spark"||col==="name"||col==="strength"?"default":"pointer"}}>
                    {label}{col!=="spark"&&col!=="name"&&col!=="strength"?sortArrow(col):""}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((c,i)=>{
                const sig=signals[c.id]?.overall||"NEUTRAL";
                const sc=signals[c.id]?.score||50;
                return (
                  <tr key={c.id} className="row" onClick={()=>setSelectedCoin(c.id)}
                    style={{borderBottom:"1px solid #0a0f1a",background:i%2===0?"#060b14":"#070c15",transition:"background .1s"}}>
                    <td style={{padding:"10px 16px",color:"#3a4a6a",fontSize:11}}>{c.rank}</td>
                    <td style={{padding:"10px 16px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div style={{width:6,height:6,borderRadius:"50%",background:c.color,flexShrink:0}}/>
                        <div>
                          <span style={{fontWeight:700,color:"#e2e8f0"}}>{c.symbol}</span>
                          <span style={{color:"#4a5a7a",marginLeft:8,fontSize:11}}>{c.name}</span>
                        </div>
                      </div>
                    </td>
                    <td style={{padding:"10px 16px",textAlign:"right",fontWeight:600,color:"#e2e8f0"}}>{fmt(c.price)}</td>
                    <td style={{padding:"10px 16px",textAlign:"right",color:c.change>=0?SC.BUY:SC.SELL,fontWeight:600}}>
                      {c.change!==null&&c.change!==undefined?`${c.change>=0?"+":""}${c.change.toFixed(2)}%`:"—"}
                    </td>
                    <td style={{padding:"10px 16px",textAlign:"right"}}>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                        <span style={{fontSize:9,padding:"3px 8px",borderRadius:3,fontWeight:700,letterSpacing:"0.08em",color:SC[sig],background:SC[sig]+"18",border:`1px solid ${SC[sig]}33`}}>{sig}</span>
                        {sellAlerts[c.id]&&<span style={{fontSize:7,padding:"2px 6px",borderRadius:2,background:"rgba(255,61,113,0.15)",color:SC.SELL,border:"1px solid #ff3d7144",fontWeight:700,letterSpacing:"0.05em",animation:"pulse 1.5s infinite"}}>🔔 SELL ALERT</span>}
                      </div>
                    </td>
                    <td style={{padding:"6px 16px",minWidth:140}}>
                      {(()=>{
                        const alpha=signals[c.id]?.alpha||50;
                        const et=signals[c.id]?.earlyTrend||false;
                        const ac=alpha>=65?SC.BUY:alpha<=35?SC.SELL:"#8896b3";
                        return <div>
                          <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
                            <div style={{flex:1,height:5,borderRadius:3,background:"#0d1525",overflow:"hidden"}}>
                              <div style={{width:`${alpha}%`,background:ac,borderRadius:3,transition:"width .3s"}}/>
                            </div>
                            <span style={{fontSize:9,color:ac,minWidth:24,textAlign:"right",fontWeight:700}}>{alpha}</span>
                          </div>
                          {et&&<span style={{fontSize:7,padding:"1px 5px",borderRadius:2,background:"rgba(255,209,102,0.15)",color:"#ffd166",border:"1px solid #ffd16633"}}>⚡ EARLY</span>}
                        </div>;
                      })()}
                    </td>
                    <td style={{padding:"6px 16px"}}>
                      <Spark data={c.sparkline?.slice(-40)} color={c.change>=0?SC.BUY:SC.SELL} w={80} h={28}/>
                    </td>
                    <td style={{padding:"6px 10px"}} onClick={e=>e.stopPropagation()}>
                      <button onClick={()=>addToWatchlist(c)}
                        style={{background:watchlist.find(w=>w.id===c.id&&!w.closed)?"rgba(0,229,160,0.12)":"none",border:`1px solid ${watchlist.find(w=>w.id===c.id&&!w.closed)?SC.BUY+"44":"#1c2535"}`,borderRadius:4,padding:"3px 8px",color:watchlist.find(w=>w.id===c.id&&!w.closed)?SC.BUY:"#3a4a6a",fontSize:8,fontFamily:"inherit",cursor:"pointer",letterSpacing:"0.05em",fontWeight:600,whiteSpace:"nowrap"}}>
                        {watchlist.find(w=>w.id===c.id&&!w.closed)?"★ WATCHING":"+ WATCH"}
                      </button>
                      <button onClick={()=>{
  const isTracked=trackedCoins.includes(c.id);
  setTrackedCoins(tc=>isTracked?tc.filter(id=>id!==c.id):[...tc,c.id]);
  if(BACKEND_URL){
    const headers={'Content-Type':'application/json'};
    if(BACKEND_API_KEY) headers['X-API-Key']=BACKEND_API_KEY;
    fetch(`${BACKEND_URL}/api/tracked`,{method:'POST',headers,body:JSON.stringify({coinId:c.id,symbol:c.symbol,name:c.name,action:isTracked?'remove':'add'})}).catch(()=>{});
  }
}}
                        style={{background:trackedCoins.includes(c.id)?"rgba(255,209,102,0.1)":"none",border:`1px solid ${trackedCoins.includes(c.id)?"#ffd16644":"#1c2535"}`,borderRadius:4,padding:"3px 8px",color:trackedCoins.includes(c.id)?"#ffd166":"#3a4a6a",fontSize:8,fontFamily:"inherit",cursor:"pointer",letterSpacing:"0.05em",fontWeight:600,whiteSpace:"nowrap",marginTop:3}}>
                        {trackedCoins.includes(c.id)?"📈 TRACKING":"📈 TRACK"}
                      </button>
                    </td>
                  </tr>
                );
              })}
              {filtered.length===0&&<tr><td colSpan={6} style={{textAlign:"center",padding:"60px 0",color:"#2a3a5a",fontSize:12}}>No coins match your filter</td></tr>}
            </tbody>
          </table>
        </div>
      )}
      <div style={{padding:"16px 24px",fontSize:10,color:"#1c2535",borderTop:"1px solid #0a0f1a"}}>
        ⚠ Signals based on 7-day sparkline data · Not financial advice · Prices via CoinGecko · Refreshes every 60s
      </div>
      </>}
      {showSettings&&<SettingsPanel cfg={cfg} setCfg={c=>{setCfg(c);setShowSettings(false);}} onClose={()=>setShowSettings(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
